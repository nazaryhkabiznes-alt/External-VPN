<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External VPN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path class="branch" d="M100 180 Q 80 100 120 50" fill="none" stroke="#2c7a7b" stroke-width="4"/>
            <circle class="leaf" cx="80" cy="120" r="8" fill="#38b2ac"/>
            <circle class="leaf" cx="120" cy="90" r="8" fill="#38b2ac"/>
        </svg>
    </div>

    <div class="container">
        <h1>External VPN</h1>
        
        <div class="vpn-circle" id="vpnCircle" onclick="toggleVPN()">
            <span id="circleText">СТАРТ</span>
        </div>

        <div class="server-selector">
            <select id="serverSelect">
                <option value="203.145.125.109">Сервер 1 (203.145.125.109)</option>
                <option value="empty">Сервер 2 (Скоро)</option>
                <option value="empty">Сервер 3 (Скоро)</option>
                <option value="empty">Сервер 4 (Скоро)</option>
            </select>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
